name: Reusable - App CI Build

on:
  workflow_call:
    inputs:
      acr_login_server:
        required: true
        type: string
      helm_repository:
        required: true
        type: string
      github_environment:
        required: false
        type: string
        default: dev
    secrets:
      azure_client_id:
        required: true
      azure_tenant_id:
        required: true
      azure_subscription_id:
        required: true
      helm_repo_token:
        required: true
      slack_webhook_url:
        required: false

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  ACR_LOGIN_SERVER: ${{ inputs.acr_login_server }}
  HELM_REPOSITORY: ${{ inputs.helm_repository }}

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    outputs:
      has_images: ${{ steps.matrix.outputs.has_images }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      services: ${{ steps.matrix.outputs.services }}
      skipped_services: ${{ steps.matrix.outputs.skipped_services }}
      helm_keys: ${{ steps.matrix.outputs.helm_keys }}
      image_tag: ${{ steps.matrix.outputs.image_tag }}
      changed_files: ${{ steps.changed_files.outputs.changed_files_inline }}
      bootstrap_services: ${{ steps.bootstrap.outputs.bootstrap_services }}
    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Print changed files
        id: changed_files
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          if [ -z "${HEAD_SHA}" ] || [ "${HEAD_SHA}" = "null" ]; then
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          fi

          echo "Base SHA: ${BASE_SHA}"
          echo "Head SHA: ${HEAD_SHA}"
          echo ""
          echo "Changed files from:"
          echo "git diff --name-only ${BASE_SHA} ${HEAD_SHA}"
          echo ""

          git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" | tee changed-files.txt

          {
            echo "### Changed files"
            echo ""
            echo '```'
            cat changed-files.txt
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          {
            echo "changed_files<<EOF"
            cat changed-files.txt
            echo "EOF"
            echo "changed_files_inline=$(paste -sd ',' changed-files.txt)"
          } >> "${GITHUB_OUTPUT}"

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.pull_request.base.sha }}
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          filters: |
            frontend:
              - 'frontend/**'
            api_gateway:
              - 'api-gateway/**'
            auth:
              - 'auth-service/**'
            collection:
              - 'collection-service/**'
            processing:
              - 'processing-service/**'
            ai:
              - 'ai-service/**'
            notification:
              - 'notification-service/**'
            shared:
              - 'shared-lib/**'
              - 'requirements/**'

      - name: Azure login for ACR bootstrap detection
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.azure_client_id }}
          tenant-id: ${{ secrets.azure_tenant_id }}
          subscription-id: ${{ secrets.azure_subscription_id }}

      - name: Detect missing ACR images for first deployment bootstrap
        id: bootstrap
        shell: bash
        run: |
          set -euo pipefail
          acr_name="${ACR_LOGIN_SERVER%%.*}"
          services=(frontend api-gateway auth-service collection-service processing-service ai-service notification-service)
          missing=()

          for service in "${services[@]}"; do
            repo="finopsiq/${service}"
            if ! az acr repository show-tags --name "${acr_name}" --repository "${repo}" --top 1 -o tsv >/tmp/acr-tags.txt 2>/tmp/acr-error.txt; then
              echo "BOOTSTRAP: ${service} has no ACR repository yet (${repo})."
              missing+=("${service}")
              continue
            fi

            if [ ! -s /tmp/acr-tags.txt ]; then
              echo "BOOTSTRAP: ${service} repository exists but has no tags."
              missing+=("${service}")
            else
              echo "ACR OK: ${service} already has at least one image tag."
            fi
          done

          bootstrap_services="$(IFS=','; echo "${missing[*]}")"
          echo "bootstrap_services=${bootstrap_services}" >> "${GITHUB_OUTPUT}"

          {
            echo "### ACR bootstrap image check"
            echo ""
            if [ "${#missing[@]}" -eq 0 ]; then
              echo "All service image repositories already contain at least one tag."
            else
              echo "Missing/empty service image repositories:"
              for service in "${missing[@]}"; do
                echo "- ${service}"
              done
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Build service matrix
        id: matrix
        shell: bash
        env:
          FRONTEND: ${{ steps.changes.outputs.frontend }}
          API_GATEWAY: ${{ steps.changes.outputs.api_gateway }}
          AUTH: ${{ steps.changes.outputs.auth }}
          COLLECTION: ${{ steps.changes.outputs.collection }}
          PROCESSING: ${{ steps.changes.outputs.processing }}
          AI: ${{ steps.changes.outputs.ai }}
          NOTIFICATION: ${{ steps.changes.outputs.notification }}
          SHARED: ${{ steps.changes.outputs.shared }}
          BOOTSTRAP_SERVICES: ${{ steps.bootstrap.outputs.bootstrap_services }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          all_services = ["frontend", "api-gateway", "auth-service", "collection-service", "processing-service", "ai-service", "notification-service"]
          defs = {
            "frontend": {"service": "frontend", "helm_key": "frontend", "context": "frontend", "dockerfile": "frontend/Dockerfile"},
            "api-gateway": {"service": "api-gateway", "helm_key": "apiGateway", "context": "api-gateway", "dockerfile": "api-gateway/Dockerfile"},
            "auth-service": {"service": "auth-service", "helm_key": "auth", "context": "auth-service", "dockerfile": "auth-service/Dockerfile"},
            "collection-service": {"service": "collection-service", "helm_key": "collection", "context": "collection-service", "dockerfile": "collection-service/Dockerfile"},
            "processing-service": {"service": "processing-service", "helm_key": "processing", "context": "processing-service", "dockerfile": "processing-service/Dockerfile"},
            "ai-service": {"service": "ai-service", "helm_key": "ai", "context": "ai-service", "dockerfile": "ai-service/Dockerfile"},
            "notification-service": {"service": "notification-service", "helm_key": "notification", "context": "notification-service", "dockerfile": "notification-service/Dockerfile"},
          }
          selected = []
          if os.environ["FRONTEND"] == "true":
            selected.append("frontend")
          for env, svc in {"API_GATEWAY":"api-gateway","AUTH":"auth-service","COLLECTION":"collection-service","PROCESSING":"processing-service","AI":"ai-service","NOTIFICATION":"notification-service"}.items():
            if os.environ[env] == "true":
              selected.append(svc)
          if os.environ["SHARED"] == "true":
            selected.extend(["api-gateway","auth-service","collection-service","processing-service","ai-service","notification-service"])
          bootstrap_services = [svc for svc in os.environ.get("BOOTSTRAP_SERVICES", "").split(",") if svc]
          selected.extend(bootstrap_services)
          deduped = []
          for svc in selected:
            if svc not in deduped:
              deduped.append(svc)
          matrix = [defs[svc] for svc in deduped]
          skipped = [svc for svc in all_services if svc not in deduped]
          changed_intents = {
            "frontend": os.environ["FRONTEND"],
            "api-gateway": os.environ["API_GATEWAY"],
            "auth-service": os.environ["AUTH"],
            "collection-service": os.environ["COLLECTION"],
            "processing-service": os.environ["PROCESSING"],
            "ai-service": os.environ["AI"],
            "notification-service": os.environ["NOTIFICATION"],
            "shared": os.environ["SHARED"],
            "bootstrap": ",".join(bootstrap_services),
          }
          print(f"has_images={'true' if matrix else 'false'}")
          print(f"services={','.join(deduped)}")
          print(f"skipped_services={','.join(skipped)}")
          print(f"helm_keys={','.join(item['helm_key'] for item in matrix)}")
          print(f"matrix={json.dumps(matrix, separators=(',', ':'))}")
          source_sha = os.environ.get("MERGE_SHA") or os.environ.get("HEAD_SHA")
          print(f"image_tag={source_sha[:6]}")
          print(f"debug={json.dumps(changed_intents, separators=(',', ':'))}")
          PY

      - name: Print detected services and build matrix
        shell: bash
        env:
          SERVICES: ${{ steps.matrix.outputs.services }}
          SKIPPED_SERVICES: ${{ steps.matrix.outputs.skipped_services }}
          HELM_KEYS: ${{ steps.matrix.outputs.helm_keys }}
          MATRIX: ${{ steps.matrix.outputs.matrix }}
          BOOTSTRAP_SERVICES: ${{ steps.bootstrap.outputs.bootstrap_services }}
        run: |
          {
            echo "### Build selection"
            echo ""
            echo "- Bootstrap services: ${BOOTSTRAP_SERVICES:-none}"
            echo "- Changed services selected for image build: ${SERVICES:-none}"
            echo "- Skipped services: ${SKIPPED_SERVICES:-none}"
            echo "- Helm keys selected for update: ${HELM_KEYS:-none}"
            echo ""
            echo "Build matrix:"
            echo '```json'
            echo "${MATRIX:-[]}" | jq .
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "Changed services selected for image build: ${SERVICES:-none}"
          echo "Skipped services: ${SKIPPED_SERVICES:-none}"
          echo "Helm keys selected for update: ${HELM_KEYS:-none}"
          echo "Build matrix:"
          echo "${MATRIX:-[]}" | jq .

  build-and-scan:
    name: Build & Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has_images == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Build image
        run: |
          docker build \
            -t "${ACR_LOGIN_SERVER}/finopsiq/${{ matrix.service }}:${{ needs.detect-changes.outputs.image_tag }}" \
            -f "${{ matrix.dockerfile }}" \
            "${{ matrix.context }}"

      - name: Save Docker image
        run: |
          docker save "${ACR_LOGIN_SERVER}/finopsiq/${{ matrix.service }}:${{ needs.detect-changes.outputs.image_tag }}" | gzip > image-${{ matrix.service }}.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: image-${{ matrix.service }}.tar.gz
          retention-days: 1

      - name: Create reports directory
        run: mkdir -p reports

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/finopsiq/${{ matrix.service }}:${{ needs.detect-changes.outputs.image_tag }}
          format: json
          output: reports/${{ matrix.service }}-trivy.json
          exit-code: "0"

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ matrix.service }}
          path: reports/${{ matrix.service }}-trivy.json
          retention-days: 1

  consolidate-and-evaluate:
    name: Consolidate Trivy Scans
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-scan]
    if: needs.detect-changes.outputs.has_images == 'true'
    steps:
      - name: Download all Trivy reports
        uses: actions/download-artifact@v4
        with:
          pattern: trivy-report-*
          path: reports
          merge-multiple: true

      - name: Generate summary and evaluate
        id: evaluate
        env:
          SERVICES: ${{ needs.detect-changes.outputs.services }}
        run: |
          echo "### Consolidated Trivy Vulnerability Report" > trivy-summary.md
          echo "" >> trivy-summary.md
          echo "| Service | Critical | High | Medium | Low | Status |" >> trivy-summary.md
          echo "|---------|----------|------|--------|-----|--------|" >> trivy-summary.md
          
          total_critical=0
          total_high=0
          
          IFS=',' read -ra svc_array <<< "$SERVICES"
          echo "[" > trivy-summary.json
          first=1
          for svc in "${svc_array[@]}"; do
            report="reports/${svc}-trivy.json"
            if [ ! -f "$report" ]; then
              echo "Missing report for $svc"
              continue
            fi
            
            crit=$(jq '[.Results[]? | .Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$report" || echo 0)
            high=$(jq '[.Results[]? | .Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$report" || echo 0)
            med=$(jq '[.Results[]? | .Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' "$report" || echo 0)
            low=$(jq '[.Results[]? | .Vulnerabilities[]? | select(.Severity=="LOW")] | length' "$report" || echo 0)
            
            total_critical=$((total_critical + crit))
            total_high=$((total_high + high))
            
            status="PASS"
            if [ "$crit" -gt 0 ] || [ "$high" -gt 0 ]; then
              status="FAIL"
            fi
            
            echo "| $svc | $crit | $high | $med | $low | $status |" >> trivy-summary.md
            
            if [ $first -eq 0 ]; then echo "," >> trivy-summary.json; fi
            first=0
            jq -n \
              --arg svc "$svc" \
              --argjson crit "$crit" \
              --argjson high "$high" \
              --argjson med "$med" \
              --argjson low "$low" \
              --arg status "$status" \
              '{service: $svc, critical: $crit, high: $high, medium: $med, low: $low, status: $status}' >> trivy-summary.json
          done
          echo "]" >> trivy-summary.json
          
          cat trivy-summary.md >> $GITHUB_STEP_SUMMARY
          
          echo "total_critical=$total_critical" >> $GITHUB_OUTPUT
          echo "total_high=$total_high" >> $GITHUB_OUTPUT
          
          if [ "$total_critical" -gt 0 ] || [ "$total_high" -gt 0 ]; then
            echo "HIGH or CRITICAL vulnerabilities found. Blocking push."
            exit 1
          fi

      - name: Upload consolidated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-consolidated-reports
          path: |
            trivy-summary.md
            trivy-summary.json
          retention-days: 7

      - name: Slack notification - Consolidated Results
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
          CRITICAL: ${{ steps.evaluate.outputs.total_critical || 0 }}
          HIGH: ${{ steps.evaluate.outputs.total_high || 0 }}
        run: |
          [ -n "$SLACK_WEBHOOK_URL" ] || exit 0
          summary="$(cat trivy-summary.md | sed ':a;N;$!ba;s/\n/\\n/g')"
          status="SUCCESS"
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ] || [ "${{ job.status }}" != "success" ]; then
            status="FAILED"
          fi
          jq -n \
            --arg status "$status" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg commit "${{ github.event.pull_request.head.sha }}" \
            --arg services "${{ needs.detect-changes.outputs.services }}" \
            --arg critical "$CRITICAL" \
            --arg high "$HIGH" \
            --arg workflow_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg summary "$summary" \
            '{text:("Trivy scan " + $status),blocks:[
              {type:"header",text:{type:"plain_text",text:("FinsOpsIQ CI Build - " + $status)}},
              {type:"section",fields:[
                {type:"mrkdwn",text:"*Workflow:*\nApp CI Build"},
                {type:"mrkdwn",text:"*Commit SHA:*\n\($commit)"},
                {type:"mrkdwn",text:"*Services Scanned:*\n\($services)"},
                {type:"mrkdwn",text:"*Critical:*\n\($critical)"},
                {type:"mrkdwn",text:"*High:*\n\($high)"}
              ]},
              {type:"section",text:{type:"mrkdwn",text:($summary)}},
              {type:"actions",elements:[{type:"button",text:{type:"plain_text",text:"View workflow"},url:$workflow_url}]}
            ]}' > slack-payload.json
          curl -fsS -X POST -H "Content-Type: application/json" --data @slack-payload.json "$SLACK_WEBHOOK_URL"

  push-images:
    name: Push Image - ${{ matrix.service }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    needs: [detect-changes, consolidate-and-evaluate]
    if: needs.detect-changes.outputs.has_images == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.service }}

      - name: Load Docker image
        run: docker load < image-${{ matrix.service }}.tar.gz

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.azure_client_id }}
          tenant-id: ${{ secrets.azure_tenant_id }}
          subscription-id: ${{ secrets.azure_subscription_id }}

      - name: ACR login
        run: az acr login --name "${ACR_LOGIN_SERVER%%.*}"

      - name: Push image
        run: docker push "${ACR_LOGIN_SERVER}/finopsiq/${{ matrix.service }}:${{ needs.detect-changes.outputs.image_tag }}"

  update-helm:
    name: Update Helm dev-values.yaml
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - push-images
    if: needs.detect-changes.outputs.has_images == 'true' && needs.push-images.result == 'success'
    steps:
      - name: Normalize Helm repository format
        id: helm_repository
        shell: bash
        run: |
          set -euo pipefail
          repository="${HELM_REPOSITORY}"
          if [[ "${repository}" != */* ]]; then
            repository="${{ github.repository_owner }}/${repository}"
          fi
          echo "repository=${repository}" >> "${GITHUB_OUTPUT}"

      - name: Checkout Helm repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.helm_repository.outputs.repository }}
          token: ${{ secrets.helm_repo_token }}
          path: helm-repo

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update only rebuilt service image tags
        working-directory: helm-repo
        env:
          IMAGE_TAG: ${{ needs.detect-changes.outputs.image_tag }}
          HELM_KEYS: ${{ needs.detect-changes.outputs.helm_keys }}
        run: |
          set -euo pipefail
          IFS=',' read -ra keys <<< "$HELM_KEYS"
          for key in "${keys[@]}"; do
            [ -n "$key" ] || continue
            yq -i ".services.${key}.image.tag = strenv(IMAGE_TAG)" charts/finopsiq/dev-values.yaml
          done
          git diff -- charts/finopsiq/dev-values.yaml

      - name: Commit Helm changes
        working-directory: helm-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No Helm changes."
            exit 0
          fi
          git add charts/finopsiq/dev-values.yaml
          git commit -m "chore: update dev image tags to ${{ needs.detect-changes.outputs.image_tag }}"
          git push

  no-image-build:
    name: No Image Build Required
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_images != 'true'
    steps:
      - name: Explain why no image build is required
        env:
          CHANGED_FILES: ${{ needs.detect-changes.outputs.changed_files }}
          BOOTSTRAP_SERVICES: ${{ needs.detect-changes.outputs.bootstrap_services }}
        run: |
          {
            echo "No image-owning paths changed and no missing ACR bootstrap images were detected."
            echo ""
            echo "Changed files:"
            echo "${CHANGED_FILES:-none}"
            echo ""
            echo "Bootstrap services:"
            echo "${BOOTSTRAP_SERVICES:-none}"
          }

  slack-success:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - build-and-scan
      - consolidate-and-evaluate
      - push-images
      - update-helm
      - no-image-build
    if: always()
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
        run: |
          [ -n "$SLACK_WEBHOOK_URL" ] || exit 0
          failed="${{ contains(needs.*.result, 'failure') }}"
          status="SUCCESS"
          text="Image build pipeline completed."
          [ "$failed" = "true" ] && status="FAILED" && text="Image build pipeline failed."
          jq -n \
            --arg status "$status" \
            --arg text "$text" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg tag "${{ needs.detect-changes.outputs.image_tag || 'none' }}" \
            --arg services "${{ needs.detect-changes.outputs.services || 'none' }}" \
            --arg workflow_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{text:$text,blocks:[
              {type:"header",text:{type:"plain_text",text:("FinsOpsIQ CI Build Pipeline - " + $status)}},
              {type:"section",fields:[
                {type:"mrkdwn",text:"*Repository:*\n\($repository)"},
                {type:"mrkdwn",text:"*Image Tag:*\n\($tag)"},
                {type:"mrkdwn",text:"*Services:*\n\($services)"}
              ]},
              {type:"actions",elements:[{type:"button",text:{type:"plain_text",text:"View workflow"},url:$workflow_url}]}
            ]}' > slack-payload.json
          curl -fsS -X POST -H "Content-Type: application/json" --data @slack-payload.json "$SLACK_WEBHOOK_URL"
