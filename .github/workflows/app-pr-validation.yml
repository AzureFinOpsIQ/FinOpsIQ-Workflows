name: Reusable - App PR Validation

on:
  workflow_call:
    inputs:
      acr_login_server:
        required: true
        type: string
      sonar_organization:
        required: true
        type: string
      sonar_project_key:
        required: true
        type: string
    secrets:
      azure_client_id:
        required: true
      azure_tenant_id:
        required: true
      azure_subscription_id:
        required: true
      sonar_token:
        required: true
      snyk_token:
        required: true
      slack_webhook_url:
        required: false

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

env:
  ACR_LOGIN_SERVER: ${{ inputs.acr_login_server }}

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      has_images: ${{ steps.matrix.outputs.has_images }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      services: ${{ steps.matrix.outputs.services }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            api_gateway:
              - 'src/gateway_service/**'
            auth:
              - 'src/auth_service/**'
              - 'src/onboarding/**'
            collection:
              - 'src/collection_service/**'
            processing:
              - 'src/processing_service/**'
            ai:
              - 'src/ai_service/**'
            notification:
              - 'src/notification_service/**'
            shared:
              - 'src/common/**'
              - 'src/adapters/**'
              - 'src/config/**'
            helm:
              - 'helm/**'
              - 'charts/**'
            docs:
              - 'docs/**'
              - '**/*.md'

      - name: Build service matrix
        id: matrix
        shell: bash
        env:
          FRONTEND: ${{ steps.changes.outputs.frontend }}
          API_GATEWAY: ${{ steps.changes.outputs.api_gateway }}
          AUTH: ${{ steps.changes.outputs.auth }}
          COLLECTION: ${{ steps.changes.outputs.collection }}
          PROCESSING: ${{ steps.changes.outputs.processing }}
          AI: ${{ steps.changes.outputs.ai }}
          NOTIFICATION: ${{ steps.changes.outputs.notification }}
          SHARED: ${{ steps.changes.outputs.shared }}
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          service_defs = {
              "frontend": {
                  "service": "frontend",
                  "helm_key": "frontend",
                  "context": "frontend",
                  "dockerfile": "frontend/Dockerfile",
              },
              "api-gateway": {
                  "service": "api-gateway",
                  "helm_key": "apiGateway",
                  "context": ".",
                  "dockerfile": "services/api-gateway/Dockerfile",
              },
              "auth-service": {
                  "service": "auth-service",
                  "helm_key": "auth",
                  "context": ".",
                  "dockerfile": "services/auth-service/Dockerfile",
              },
              "collection-service": {
                  "service": "collection-service",
                  "helm_key": "collection",
                  "context": ".",
                  "dockerfile": "services/collection-service/Dockerfile",
              },
              "processing-service": {
                  "service": "processing-service",
                  "helm_key": "processing",
                  "context": ".",
                  "dockerfile": "services/processing-service/Dockerfile",
              },
              "ai-service": {
                  "service": "ai-service",
                  "helm_key": "ai",
                  "context": ".",
                  "dockerfile": "services/ai-service/Dockerfile",
              },
              "notification-service": {
                  "service": "notification-service",
                  "helm_key": "notification",
                  "context": ".",
                  "dockerfile": "services/notification-service/Dockerfile",
              },
          }

          selected = []
          if os.environ["FRONTEND"] == "true":
              selected.append("frontend")

          backend_filters = {
              "API_GATEWAY": "api-gateway",
              "AUTH": "auth-service",
              "COLLECTION": "collection-service",
              "PROCESSING": "processing-service",
              "AI": "ai-service",
              "NOTIFICATION": "notification-service",
          }
          for env_name, service in backend_filters.items():
              if os.environ[env_name] == "true":
                  selected.append(service)

          if os.environ["SHARED"] == "true":
              selected.extend([
                  "api-gateway",
                  "auth-service",
                  "collection-service",
                  "processing-service",
                  "ai-service",
                  "notification-service",
              ])

          deduped = []
          seen = set()
          for service in selected:
              if service not in seen:
                  seen.add(service)
                  deduped.append(service)

          matrix = [service_defs[service] for service in deduped]
          print(f"has_images={'true' if matrix else 'false'}")
          print(f"matrix={json.dumps(matrix, separators=(',', ':'))}")
          print(f"services={','.join(deduped)}")
          PY

      - name: Summarize changed services
        run: |
          echo "Changed image services: ${{ steps.matrix.outputs.services || 'none' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Helm-only and documentation-only changes do not build images." >> "$GITHUB_STEP_SUMMARY"

  sonarcloud-sast:
    name: SonarCloud SAST
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.sonar_token }}
        with:
          args: >
            -Dsonar.organization=${{ inputs.sonar_organization }}
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.qualitygate.wait=true

  snyk-dependency-scan:
    name: Snyk Dependency Scan
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth "$SNYK_TOKEN"
        env:
          SNYK_TOKEN: ${{ secrets.snyk_token }}

      - name: Scan Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          files=("requirements.txt" "requirements.service.txt")
          while IFS= read -r file; do
            files+=("$file")
          done < <(find services -name "requirements*.txt" -type f | sort)
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              snyk test --file="$file" --package-manager=pip --severity-threshold=high --json-file-output="snyk-$(basename "$file").json"
            fi
          done

      - name: Scan Node dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f frontend/package.json ]; then
            snyk test --file=frontend/package.json --severity-threshold=high --json-file-output=snyk-frontend.json
          fi

      - name: Upload Snyk reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-reports
          path: snyk-*.json
          if-no-files-found: ignore

  docker-build-scan-push:
    name: Build, Scan, and Push Development Images
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - sonarcloud-sast
      - snyk-dependency-scan
    if: needs.detect-changes.outputs.has_images == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image tag
        id: image
        shell: bash
        run: |
          short_sha="${{ github.event.pull_request.head.sha }}"
          short_sha="${short_sha::7}"
          echo "tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "image=${ACR_LOGIN_SERVER}/finopsiq/${{ matrix.service }}:sha-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build -t "${{ steps.image.outputs.image }}" -f "${{ matrix.dockerfile }}" "${{ matrix.context }}"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.image.outputs.image }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.sarif
          if-no-files-found: ignore

      - name: Azure login
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.azure_client_id }}
          tenant-id: ${{ secrets.azure_tenant_id }}
          subscription-id: ${{ secrets.azure_subscription_id }}

      - name: ACR login
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: az acr login --name "${ACR_LOGIN_SERVER%%.*}"

      - name: Push development image
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: docker push "${{ steps.image.outputs.image }}"

  no-image-build:
    name: No Image Build Required
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - sonarcloud-sast
      - snyk-dependency-scan
    if: needs.detect-changes.outputs.has_images != 'true'
    steps:
      - name: Explain skip
        run: echo "No image-owning paths changed. Skipping Docker build, Trivy image scan, and ACR push."

  slack-notification:
    name: Slack Notification
    runs-on: ubuntu-latest
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
    needs:
      - detect-changes
      - sonarcloud-sast
      - snyk-dependency-scan
      - docker-build-scan-push
      - no-image-build
    steps:
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "${{ contains(needs.*.result, 'failure') && 'PR validation failed.' || 'PR validation passed.' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*FinsOpsIQ PR Validation*\nStatus: `${{ contains(needs.*.result, 'failure') && 'FAILED' || 'PASSED' }}`\nRepository: `${{ github.repository }}`\nPR: `#${{ github.event.pull_request.number }}`\nCommit: `${{ github.event.pull_request.head.sha }}`\nImages built: `${{ needs.detect-changes.outputs.services || 'none' }}`"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
