name: Reusable - App Release Build

on:
  workflow_call:
    inputs:
      acr_login_server:
        required: true
        type: string
      helm_repository:
        required: true
        type: string
    secrets:
      azure_client_id:
        required: true
      azure_tenant_id:
        required: true
      azure_subscription_id:
        required: true
      helm_repo_token:
        required: true
      slack_webhook_url:
        required: false

permissions:
  contents: write
  id-token: write
  packages: write
  security-events: write

env:
  ACR_LOGIN_SERVER: ${{ inputs.acr_login_server }}
  HELM_REPOSITORY: ${{ inputs.helm_repository }}

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      has_images: ${{ steps.matrix.outputs.has_images }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      services: ${{ steps.matrix.outputs.services }}
      helm_keys: ${{ steps.matrix.outputs.helm_keys }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          base: ${{ github.event.before }}
          ref: ${{ github.sha }}
          filters: |
            frontend:
              - 'frontend/**'
            api_gateway:
              - 'src/gateway_service/**'
            auth:
              - 'src/auth_service/**'
              - 'src/onboarding/**'
            collection:
              - 'src/collection_service/**'
            processing:
              - 'src/processing_service/**'
            ai:
              - 'src/ai_service/**'
            notification:
              - 'src/notification_service/**'
            shared:
              - 'src/common/**'
              - 'src/adapters/**'
              - 'src/config/**'
            helm:
              - 'helm/**'
              - 'charts/**'
            docs:
              - 'docs/**'
              - '**/*.md'

      - name: Build service matrix
        id: matrix
        shell: bash
        env:
          FRONTEND: ${{ steps.changes.outputs.frontend }}
          API_GATEWAY: ${{ steps.changes.outputs.api_gateway }}
          AUTH: ${{ steps.changes.outputs.auth }}
          COLLECTION: ${{ steps.changes.outputs.collection }}
          PROCESSING: ${{ steps.changes.outputs.processing }}
          AI: ${{ steps.changes.outputs.ai }}
          NOTIFICATION: ${{ steps.changes.outputs.notification }}
          SHARED: ${{ steps.changes.outputs.shared }}
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          service_defs = {
              "frontend": {"service": "frontend", "helm_key": "frontend", "context": "frontend", "dockerfile": "frontend/Dockerfile"},
              "api-gateway": {"service": "api-gateway", "helm_key": "apiGateway", "context": ".", "dockerfile": "services/api-gateway/Dockerfile"},
              "auth-service": {"service": "auth-service", "helm_key": "auth", "context": ".", "dockerfile": "services/auth-service/Dockerfile"},
              "collection-service": {"service": "collection-service", "helm_key": "collection", "context": ".", "dockerfile": "services/collection-service/Dockerfile"},
              "processing-service": {"service": "processing-service", "helm_key": "processing", "context": ".", "dockerfile": "services/processing-service/Dockerfile"},
              "ai-service": {"service": "ai-service", "helm_key": "ai", "context": ".", "dockerfile": "services/ai-service/Dockerfile"},
              "notification-service": {"service": "notification-service", "helm_key": "notification", "context": ".", "dockerfile": "services/notification-service/Dockerfile"},
          }
          selected = []
          if os.environ["FRONTEND"] == "true":
              selected.append("frontend")
          for env_name, service in {
              "API_GATEWAY": "api-gateway",
              "AUTH": "auth-service",
              "COLLECTION": "collection-service",
              "PROCESSING": "processing-service",
              "AI": "ai-service",
              "NOTIFICATION": "notification-service",
          }.items():
              if os.environ[env_name] == "true":
                  selected.append(service)
          if os.environ["SHARED"] == "true":
              selected.extend(["api-gateway", "auth-service", "collection-service", "processing-service", "ai-service", "notification-service"])
          deduped = []
          seen = set()
          for service in selected:
              if service not in seen:
                  seen.add(service)
                  deduped.append(service)
          matrix = [service_defs[service] for service in deduped]
          print(f"has_images={'true' if matrix else 'false'}")
          print(f"matrix={json.dumps(matrix, separators=(',', ':'))}")
          print(f"services={','.join(deduped)}")
          print(f"helm_keys={','.join(item['helm_key'] for item in matrix)}")
          PY

  version:
    name: Determine Semantic Version
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_images == 'true'
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: semver
        shell: bash
        run: |
          set -euo pipefail
          latest="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          if [ -z "$latest" ]; then
            echo "version=v1.0.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          range="${latest}..HEAD"
          commits="$(git log --format=%B "$range")"
          major="$(echo "$commits" | grep -E 'BREAKING CHANGE|^[a-zA-Z]+(\(.+\))?!:' || true)"
          minor="$(echo "$commits" | grep -E '^feat(\(.+\))?:' || true)"
          raw="${latest#v}"
          IFS='.' read -r major_v minor_v patch_v <<< "$raw"
          if [ -n "$major" ]; then
            major_v=$((major_v + 1)); minor_v=0; patch_v=0
          elif [ -n "$minor" ]; then
            minor_v=$((minor_v + 1)); patch_v=0
          else
            patch_v=$((patch_v + 1))
          fi
          echo "version=v${major_v}.${minor_v}.${patch_v}" >> "$GITHUB_OUTPUT"

  build-scan-push:
    name: Build, Scan, and Push Release Images
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - version
    if: needs.detect-changes.outputs.has_images == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.azure_client_id }}
          tenant-id: ${{ secrets.azure_tenant_id }}
          subscription-id: ${{ secrets.azure_subscription_id }}

      - name: ACR login
        run: az acr login --name "${ACR_LOGIN_SERVER%%.*}"

      - name: Build image
        run: |
          docker build \
            -t "${ACR_LOGIN_SERVER}/finopsiq/${{ matrix.service }}:${{ needs.version.outputs.version }}" \
            -f "${{ matrix.dockerfile }}" \
            "${{ matrix.context }}"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.ACR_LOGIN_SERVER }}/finopsiq/${{ matrix.service }}:${{ needs.version.outputs.version }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-release-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.sarif
          if-no-files-found: ignore

      - name: Push release image
        run: docker push "${ACR_LOGIN_SERVER}/finopsiq/${{ matrix.service }}:${{ needs.version.outputs.version }}"

  create-release:
    name: Create Git Tag and GitHub Release
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - version
      - build-scan-push
    if: needs.detect-changes.outputs.has_images == 'true'
    outputs:
      release_url: ${{ steps.release.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.version.outputs.version }}" -m "Release ${{ needs.version.outputs.version }}"
          git push origin "${{ needs.version.outputs.version }}"

      - name: Create GitHub release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.version.outputs.version }}" \
            --title "${{ needs.version.outputs.version }}" \
            --notes "FinsOpsIQ release ${{ needs.version.outputs.version }}. Images rebuilt: ${{ needs.detect-changes.outputs.services }}"
          echo "url=$(gh release view "${{ needs.version.outputs.version }}" --json url --jq .url)" >> "$GITHUB_OUTPUT"

  update-helm-values:
    name: Update Helm Development Image Tags
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - version
      - create-release
    if: needs.detect-changes.outputs.has_images == 'true'
    steps:
      - name: Checkout Helm repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_REPOSITORY }}
          token: ${{ secrets.helm_repo_token }}
          path: helm-repo

      - name: Update values-dev.yaml image tags for rebuilt services only
        working-directory: helm-repo
        env:
          VERSION: ${{ needs.version.outputs.version }}
          HELM_KEYS: ${{ needs.detect-changes.outputs.helm_keys }}
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path

          values_path = Path("charts/finopsiq/values-dev.yaml")
          version = os.environ["VERSION"]
          services = {item for item in os.environ["HELM_KEYS"].split(",") if item}
          if not services:
              raise SystemExit("No Helm service keys were provided.")

          lines = values_path.read_text(encoding="utf-8").splitlines()
          current_service = None
          in_image = False
          updated = set()
          output = []
          for line in lines:
              stripped = line.strip()
              if line.startswith("  ") and not line.startswith("    ") and stripped.endswith(":"):
                  current_service = stripped[:-1]
                  in_image = False
              elif current_service in services and line.startswith("    ") and not line.startswith("      "):
                  in_image = stripped == "image:"
              elif current_service in services and in_image and line.startswith("      tag:"):
                  line = f"      tag: {version}"
                  updated.add(current_service)
              output.append(line)
          missing = sorted(services - updated)
          if missing:
              raise SystemExit(f"Did not update image tags for: {', '.join(missing)}")
          values_path.write_text("\n".join(output) + "\n", encoding="utf-8")
          PY

      - name: Commit Helm tag update
        working-directory: helm-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No Helm value changes to commit."
            exit 0
          fi
          git add charts/finopsiq/values-dev.yaml
          git commit -m "chore: promote ${{ needs.detect-changes.outputs.services }} to ${{ needs.version.outputs.version }}"
          git push

  no-image-release:
    name: No Image Release Required
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_images != 'true'
    steps:
      - name: Explain skip
        run: echo "No image-owning paths changed. Skipping image build, GitHub Release, and Helm tag updates."

  slack-notification:
    name: Slack Notification
    runs-on: ubuntu-latest
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
    needs:
      - detect-changes
      - version
      - build-scan-push
      - create-release
      - update-helm-values
      - no-image-release
    steps:
      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "${{ contains(needs.*.result, 'failure') && 'Release failed.' || 'Release completed.' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*FinsOpsIQ Release Build*\nStatus: `${{ contains(needs.*.result, 'failure') && 'FAILED' || 'SUCCESS' }}`\nVersion: `${{ needs.version.outputs.version || 'not-created' }}`\nRepository: `${{ github.repository }}`\nCommit: `${{ github.sha }}`\nImages rebuilt: `${{ needs.detect-changes.outputs.services || 'none' }}`\nRelease URL: `${{ needs.create-release.outputs.release_url || 'not-created' }}`"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View workflow"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
