name: Reusable - App CI Scan

on:
  workflow_call:
    inputs:
      sonar_organization:
        required: true
        type: string
      sonar_project_key:
        required: false
        type: string
        default: ""
      sonar_project_prefix:
        required: false
        type: string
        default: ""
    secrets:
      sonar_token:
        required: true
      snyk_token:
        required: true
      slack_webhook_url:
        required: false

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      has_services: ${{ steps.matrix.outputs.has_services }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      services: ${{ steps.matrix.outputs.services }}
      skipped_services: ${{ steps.matrix.outputs.skipped_services }}
      changed_files: ${{ steps.changed_files.outputs.changed_files_inline }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Print changed files
        id: changed_files
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          echo "Base SHA: ${BASE_SHA}"
          echo "Head SHA: ${HEAD_SHA}"
          echo ""
          echo "Changed files from:"
          echo "git diff --name-only ${BASE_SHA} ${HEAD_SHA}"
          echo ""

          git diff --name-only "${BASE_SHA}" "${HEAD_SHA}" | tee changed-files.txt

          {
            echo "### Changed files"
            echo ""
            echo '```'
            cat changed-files.txt
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          {
            echo "changed_files<<EOF"
            cat changed-files.txt
            echo "EOF"
            echo "changed_files_inline=$(paste -sd ',' changed-files.txt)"
          } >> "${GITHUB_OUTPUT}"

      - name: Detect changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            api_gateway:
              - 'api-gateway/**'
            auth:
              - 'auth-service/**'
            collection:
              - 'collection-service/**'
            processing:
              - 'processing-service/**'
            ai:
              - 'ai-service/**'
            notification:
              - 'notification-service/**'
            shared:
              - 'shared-lib/**'
              - 'requirements/**'

      - name: Build service matrix
        id: matrix
        shell: bash
        env:
          FRONTEND: ${{ steps.changes.outputs.frontend }}
          API_GATEWAY: ${{ steps.changes.outputs.api_gateway }}
          AUTH: ${{ steps.changes.outputs.auth }}
          COLLECTION: ${{ steps.changes.outputs.collection }}
          PROCESSING: ${{ steps.changes.outputs.processing }}
          AI: ${{ steps.changes.outputs.ai }}
          NOTIFICATION: ${{ steps.changes.outputs.notification }}
          SHARED: ${{ steps.changes.outputs.shared }}
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          all_services = ["frontend", "api-gateway", "auth-service", "collection-service", "processing-service", "ai-service", "notification-service", "shared-lib"]
          defs = {
            "frontend": {"service": "frontend", "path": "frontend", "type": "node", "manifest": "frontend/package.json"},
            "api-gateway": {"service": "api-gateway", "path": "api-gateway", "type": "python", "manifest": "api-gateway/requirements.txt"},
            "auth-service": {"service": "auth-service", "path": "auth-service", "type": "python", "manifest": "auth-service/requirements.txt"},
            "collection-service": {"service": "collection-service", "path": "collection-service", "type": "python", "manifest": "collection-service/requirements.txt"},
            "processing-service": {"service": "processing-service", "path": "processing-service", "type": "python", "manifest": "processing-service/requirements.txt"},
            "ai-service": {"service": "ai-service", "path": "ai-service", "type": "python", "manifest": "ai-service/requirements.txt"},
            "notification-service": {"service": "notification-service", "path": "notification-service", "type": "python", "manifest": "notification-service/requirements.txt"},
            "shared-lib": {"service": "shared-lib", "path": "shared-lib", "type": "python", "manifest": "requirements/services/base.txt"},
          }
          selected = []
          if os.environ["FRONTEND"] == "true":
            selected.append("frontend")
          for env, svc in {
            "API_GATEWAY": "api-gateway",
            "AUTH": "auth-service",
            "COLLECTION": "collection-service",
            "PROCESSING": "processing-service",
            "AI": "ai-service",
            "NOTIFICATION": "notification-service",
          }.items():
            if os.environ[env] == "true":
              selected.append(svc)
          if os.environ["SHARED"] == "true":
            selected.extend(["shared-lib", "api-gateway", "auth-service", "collection-service", "processing-service", "ai-service", "notification-service"])
          deduped = []
          for svc in selected:
            if svc not in deduped:
              deduped.append(svc)
          matrix = [defs[svc] for svc in deduped]
          skipped = [svc for svc in all_services if svc not in deduped]
          print(f"has_services={'true' if matrix else 'false'}")
          print(f"services={','.join(deduped)}")
          print(f"skipped_services={','.join(skipped)}")
          print(f"matrix={json.dumps(matrix, separators=(',', ':'))}")
          PY

      - name: Print detected services and scan matrix
        shell: bash
        env:
          CHANGED_FILES: ${{ steps.changed_files.outputs.changed_files_inline }}
          SERVICES: ${{ steps.matrix.outputs.services }}
          SKIPPED_SERVICES: ${{ steps.matrix.outputs.skipped_services }}
          MATRIX: ${{ steps.matrix.outputs.matrix }}
        run: |
          {
            echo "### CI scan selection"
            echo ""
            echo "- Changed files: ${CHANGED_FILES:-none}"
            echo "- Changed services: ${SERVICES:-none}"
            echo "- Skipped services: ${SKIPPED_SERVICES:-none}"
            echo ""
            echo "Scan matrix:"
            echo '```json'
            echo "${MATRIX:-[]}" | jq .
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "Changed files: ${CHANGED_FILES:-none}"
          echo "Changed services: ${SERVICES:-none}"
          echo "Skipped services: ${SKIPPED_SERVICES:-none}"
          echo "${MATRIX:-[]}" | jq .

  lint-test:
    name: Lint Test - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_services == 'true'
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Frontend lint and test
        if: matrix.type == 'node'
        working-directory: ${{ matrix.path }}
        run: |
          set -euo pipefail
          npm ci
          npm run lint

          has_test_script="$(node -e "const pkg=require('./package.json'); process.stdout.write(pkg.scripts && pkg.scripts.test ? 'true' : 'false')")"

          if [ "$has_test_script" = "true" ]; then
            npm test
            test_stage="Executed"
          else
            echo "No frontend tests configured. Skipping test stage."
            test_stage="Skipped"
          fi

          {
            echo "### Frontend validation - ${{ matrix.service }}"
            echo ""
            if [ "$has_test_script" = "true" ]; then
              echo "- Frontend tests detected: Yes"
            else
              echo "- Frontend tests detected: No"
            fi
            echo "- Test stage executed: ${test_stage}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Python
        if: matrix.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python lint and test
        if: matrix.type == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/services/base.txt
          pip install ./shared-lib
          if [ "${{ matrix.service }}" != "shared-lib" ]; then pip install -r ${{ matrix.manifest }}; fi
          pip install ruff pytest pytest-cov
          if [ "${{ matrix.service }}" = "shared-lib" ]; then
            lint_paths="shared-lib/shared_lib"
            test_path="shared-lib/tests"
            cov_source="shared-lib/shared_lib"
          else
            lint_paths="${{ matrix.path }}/src shared-lib/shared_lib"
            test_path="${{ matrix.path }}/tests"
            cov_source="${{ matrix.path }}/src"
          fi
          if [ -d "$test_path" ]; then lint_paths="$lint_paths $test_path"; fi
          ruff check $lint_paths
          coverage_file="coverage-${{ matrix.service }}.xml"
          if [ -d "$test_path" ] && find "$test_path" -name 'test_*.py' -print -quit | grep -q .; then
            pytest "$test_path" -q \
              --cov="$cov_source" \
              --cov-report="term-missing" \
              --cov-report="xml:${coverage_file}"
          else
            echo "No Python tests found for ${{ matrix.service }}. Coverage file will not be generated."
          fi
          echo ""
          echo "Generated coverage files:"
          find . -maxdepth 2 -name 'coverage-*.xml' -type f -print -exec ls -lh {} \;
          {
            echo "### Python coverage - ${{ matrix.service }}"
            echo ""
            if [ -f "${coverage_file}" ]; then
              echo "- coverage.xml location: ${coverage_file}"
            else
              echo "- coverage.xml location: not generated"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Slack notification - Lint/Test failed
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
        run: |
          [ -n "$SLACK_WEBHOOK_URL" ] || exit 0
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg pr "${{ github.event.pull_request.number }}" \
            --arg author "${{ github.actor }}" \
            --arg commit "${{ github.event.pull_request.head.sha }}" \
            --arg service "${{ matrix.service }}" \
            --arg workflow_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{text:"Lint/Test failed. SonarCloud was not started.",blocks:[
              {type:"header",text:{type:"plain_text",text:"FinsOpsIQ CI Scan - Lint/Test Failed"}},
              {type:"section",fields:[
                {type:"mrkdwn",text:"*Repository:*\n\($repository)"},
                {type:"mrkdwn",text:"*PR:*\n#\($pr)"},
                {type:"mrkdwn",text:"*Author:*\n\($author)"},
                {type:"mrkdwn",text:"*Commit:*\n\($commit)"},
                {type:"mrkdwn",text:"*Service:*\n\($service)"}
              ]},
              {type:"actions",elements:[
                {type:"button",text:{type:"plain_text",text:"View workflow"},url:$workflow_url}
              ]}
            ]}' > slack-payload.json
          curl -fsS -X POST -H "Content-Type: application/json" --data @slack-payload.json "$SLACK_WEBHOOK_URL"

  python-coverage:
    name: Python Coverage - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - lint-test
    if: needs.detect-changes.outputs.has_services == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: shared-lib
            path: shared-lib
            manifest: requirements/services/base.txt
            cov_source: shared-lib/shared_lib
            test_path: shared-lib/tests
          - service: api-gateway
            path: api-gateway
            manifest: api-gateway/requirements.txt
            cov_source: api-gateway/src
            test_path: api-gateway/tests
          - service: auth-service
            path: auth-service
            manifest: auth-service/requirements.txt
            cov_source: auth-service/src
            test_path: auth-service/tests
          - service: collection-service
            path: collection-service
            manifest: collection-service/requirements.txt
            cov_source: collection-service/src
            test_path: collection-service/tests
          - service: processing-service
            path: processing-service
            manifest: processing-service/requirements.txt
            cov_source: processing-service/src
            test_path: processing-service/tests
          - service: ai-service
            path: ai-service
            manifest: ai-service/requirements.txt
            cov_source: ai-service/src
            test_path: ai-service/tests
          - service: notification-service
            path: notification-service
            manifest: notification-service/requirements.txt
            cov_source: notification-service/src
            test_path: notification-service/tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Python coverage XML
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements/services/base.txt
          pip install ./shared-lib
          if [ "${{ matrix.service }}" != "shared-lib" ]; then pip install -r ${{ matrix.manifest }}; fi
          pip install pytest pytest-cov

          coverage_file="repository-coverage-${{ matrix.service }}.xml"
          if [ -d "${{ matrix.test_path }}" ] && find "${{ matrix.test_path }}" -name 'test_*.py' -print -quit | grep -q .; then
            pytest "${{ matrix.test_path }}" -q \
              --cov="${{ matrix.cov_source }}" \
              --cov-report="term-missing" \
              --cov-report="xml:${coverage_file}"
          else
            echo "No Python tests found for ${{ matrix.service }}. Coverage file will not be generated."
          fi

          echo ""
          echo "Generated coverage files:"
          find . -maxdepth 2 -name 'repository-coverage-*.xml' -type f -print -exec ls -lh {} \;
          {
            echo "### Repository coverage - ${{ matrix.service }}"
            echo ""
            if [ -f "${coverage_file}" ]; then
              echo "- coverage.xml location: ${coverage_file}"
            else
              echo "- coverage.xml location: not generated"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Python coverage
        uses: actions/upload-artifact@v4
        with:
          name: repository-coverage-${{ matrix.service }}
          path: repository-coverage-${{ matrix.service }}.xml
          if-no-files-found: warn

  sonarcloud:
    name: SonarCloud - Repository
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - lint-test
      - python-coverage
    if: needs.detect-changes.outputs.has_services == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve SonarCloud project key
        id: sonar_project
        shell: bash
        env:
          INPUT_PROJECT_KEY: ${{ inputs.sonar_project_key }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_PROJECT_KEY}" ]; then
            project_key="${INPUT_PROJECT_KEY}"
          else
            project_key="${GITHUB_REPOSITORY//\//_}"
          fi
          echo "project_key=${project_key}" >> "$GITHUB_OUTPUT"
          {
            echo "### SonarCloud repository scan"
            echo ""
            echo "- Organization: ${{ inputs.sonar_organization }}"
            echo "- Project key: ${project_key}"
            echo "- Scope: whole FinOpsIQ-SaaS repository service source roots"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Download Python coverage reports
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: repository-coverage-*
          path: coverage-reports
          merge-multiple: true

      - name: Resolve coverage report paths
        id: coverage_reports
        shell: bash
        run: |
          set -euo pipefail
          echo "Coverage files available to SonarCloud:"
          find coverage-reports -name 'repository-coverage-*.xml' -type f -print -exec ls -lh {} \; || true
          reports="$(find coverage-reports -name 'repository-coverage-*.xml' -type f | sort | paste -sd, -)"
          echo "paths=${reports}" >> "$GITHUB_OUTPUT"
          {
            echo "### SonarCloud coverage inputs"
            echo ""
            if [ -n "$reports" ]; then
              echo "- sonar.python.coverage.reportPaths: $reports"
              echo ""
              echo '```'
              find coverage-reports -name 'repository-coverage-*.xml' -type f | sort
              echo '```'
            else
              echo "- sonar.python.coverage.reportPaths: no reports found"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run SonarCloud scan and wait for Quality Gate
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.sonar_token }}
        with:
          args: >
            -Dsonar.organization=${{ inputs.sonar_organization }}
            -Dsonar.projectKey=${{ steps.sonar_project.outputs.project_key }}
            -Dsonar.projectName=${{ github.event.repository.name }}
            -Dsonar.sources=frontend/src,api-gateway/src/src,auth-service/src/src,collection-service/src/src,processing-service/src/src,ai-service/src/src,notification-service/src/src,shared-lib/shared_lib
            -Dsonar.tests=api-gateway/tests,auth-service/tests,collection-service/tests,processing-service/tests,ai-service/tests,notification-service/tests,shared-lib/tests
            -Dsonar.python.coverage.reportPaths=${{ steps.coverage_reports.outputs.paths }}
            -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/__pycache__/**,**/.pytest_cache/**,**/.ruff_cache/**,**/shared-lib/**/tests/**,**/tests/mock_data/**
            -Dsonar.qualitygate.wait=true

      - name: Slack notification - SonarCloud failed
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
        run: |
          [ -n "$SLACK_WEBHOOK_URL" ] || exit 0
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg pr "${{ github.event.pull_request.number }}" \
            --arg author "${{ github.actor }}" \
            --arg commit "${{ github.event.pull_request.head.sha }}" \
            --arg sonar_url "https://sonarcloud.io/project/overview?id=${{ steps.sonar_project.outputs.project_key }}" \
            --arg workflow_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{text:"SonarCloud Quality Gate failed.",blocks:[
              {type:"header",text:{type:"plain_text",text:"FinsOpsIQ CI Scan - SonarCloud Failed"}},
              {type:"section",fields:[
                {type:"mrkdwn",text:"*Repository:*\n\($repository)"},
                {type:"mrkdwn",text:"*PR:*\n#\($pr)"},
                {type:"mrkdwn",text:"*Author:*\n\($author)"},
                {type:"mrkdwn",text:"*Commit:*\n\($commit)"},
                {type:"mrkdwn",text:"*Failed Quality Gate:*\nSonarCloud"}
              ]},
              {type:"actions",elements:[
                {type:"button",text:{type:"plain_text",text:"SonarCloud"},url:$sonar_url},
                {type:"button",text:{type:"plain_text",text:"View workflow"},url:$workflow_url}
              ]}
            ]}' > slack-payload.json
          curl -fsS -X POST -H "Content-Type: application/json" --data @slack-payload.json "$SLACK_WEBHOOK_URL"

  snyk:
    name: Snyk - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - sonarcloud
    if: needs.detect-changes.outputs.has_services == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: matrix.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        if: matrix.type == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk scan
        id: snyk_scan
        shell: bash
        env:
          SNYK_TOKEN: ${{ secrets.snyk_token }}
        run: |
          set +e
          snyk auth "$SNYK_TOKEN"
          report="snyk-${{ matrix.service }}.json"
          if [ "${{ matrix.type }}" = "node" ]; then
            snyk test --file="${{ matrix.manifest }}" --severity-threshold=high --json-file-output="$report"
          else
            file="${{ matrix.path }}/requirements.txt"
            [ -f "$file" ] || file="${{ matrix.manifest }}"
            snyk test --file="$file" --package-manager=pip --severity-threshold=high --json-file-output="$report"
          fi
          code=$?
          count=0
          if [ -f "$report" ]; then
            count="$(jq '[.vulnerabilities[]? | select(.severity == "high" or .severity == "critical")] | length' "$report")"
          fi
          echo "vulnerability_count=$count" >> "$GITHUB_OUTPUT"
          echo "report=$report" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Upload Snyk report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-${{ matrix.service }}
          path: snyk-${{ matrix.service }}.json
          if-no-files-found: ignore

      - name: Slack notification - Snyk failed
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
        run: |
          [ -n "$SLACK_WEBHOOK_URL" ] || exit 0
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg pr "${{ github.event.pull_request.number }}" \
            --arg service "${{ matrix.service }}" \
            --arg count "${{ steps.snyk_scan.outputs.vulnerability_count || 'unknown' }}" \
            --arg snyk_url "https://app.snyk.io/org" \
            --arg workflow_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{text:"Snyk dependency scan failed.",blocks:[
              {type:"header",text:{type:"plain_text",text:"FinsOpsIQ CI Scan - Snyk Failed"}},
              {type:"section",fields:[
                {type:"mrkdwn",text:"*Repository:*\n\($repository)"},
                {type:"mrkdwn",text:"*PR:*\n#\($pr)"},
                {type:"mrkdwn",text:"*Service:*\n\($service)"},
                {type:"mrkdwn",text:"*High/Critical Count:*\n\($count)"},
                {type:"mrkdwn",text:"*Snyk Report:*\n\($snyk_url)"}
              ]},
              {type:"actions",elements:[
                {type:"button",text:{type:"plain_text",text:"View workflow"},url:$workflow_url}
              ]}
            ]}' > slack-payload.json
          curl -fsS -X POST -H "Content-Type: application/json" --data @slack-payload.json "$SLACK_WEBHOOK_URL"

  no-service-changes:
    name: No Service Changes
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_services != 'true'
    steps:
      - run: echo "No service-owning paths changed. Skipping SonarCloud and Snyk."
