name: Reusable - Terraform Infrastructure DEV

on:
  workflow_call:
    inputs:
      tf_working_dir:
        required: false
        type: string
        default: environments/dev
      tf_state_key:
        required: false
        type: string
        default: dev/terraform.tfstate
      tf_state_resource_group:
        required: true
        type: string
      tf_state_storage_account:
        required: true
        type: string
      tf_state_container:
        required: true
        type: string
      tf_lock_timeout:
        required: false
        type: string
        default: 15m
    secrets:
      azure_client_id:
        required: true
      azure_tenant_id:
        required: true
      azure_subscription_id:
        required: true
      slack_webhook_url:
        required: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-dev
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_WORKING_DIR: ${{ inputs.tf_working_dir }}
  TF_STATE_KEY: ${{ inputs.tf_state_key }}
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.azure_client_id }}
  ARM_TENANT_ID: ${{ secrets.azure_tenant_id }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.azure_subscription_id }}
  TF_STATE_RESOURCE_GROUP: ${{ inputs.tf_state_resource_group }}
  TF_STATE_STORAGE_ACCOUNT: ${{ inputs.tf_state_storage_account }}
  TF_STATE_CONTAINER: ${{ inputs.tf_state_container }}
  TF_LOCK_TIMEOUT: ${{ inputs.tf_lock_timeout }}

jobs:
  security_quality:
    name: "Stage 1 - Security and Quality"
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: environments/dev
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov-report.sarif
          soft_fail: false
          quiet: true
          check: CKV*
          hard_fail_on: HIGH,CRITICAL

      - name: Upload Checkov report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkov-dev-report
          path: checkov-report.sarif
          if-no-files-found: warn
          retention-days: 14

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.azure_client_id }}
          tenant-id: ${{ secrets.azure_tenant_id }}
          subscription-id: ${{ secrets.azure_subscription_id }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${TF_STATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_STATE_CONTAINER}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

  terraform_plan:
    name: "Stage 2 - Terraform Format, Plan and Slack"
    runs-on: ubuntu-latest
    needs:
      - security_quality
    if: github.event_name != 'schedule'
    outputs:
      add_count: ${{ steps.plan_summary.outputs.add_count }}
      modify_count: ${{ steps.plan_summary.outputs.modify_count }}
      destroy_count: ${{ steps.plan_summary.outputs.destroy_count }}
      summary_text: ${{ steps.plan_summary.outputs.summary_text }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.azure_client_id }}
          tenant-id: ${{ secrets.azure_tenant_id }}
          subscription-id: ${{ secrets.azure_subscription_id }}

      - name: Terraform format check
        run: terraform fmt -check -recursive .

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${TF_STATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_STATE_CONTAINER}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="use_azuread_auth=true"

      - name: Import existing DEV resources into Terraform state
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bash scripts/import-existing-dev.sh

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -lock-timeout="${TF_LOCK_TIMEOUT}" -out=dev.tfplan

      - name: Generate Terraform plan summary
        id: plan_summary
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform show -json dev.tfplan > dev.tfplan.json
          ADD_COUNT=$(jq '[.resource_changes[]? | select(.change.actions | index("create"))] | length' dev.tfplan.json)
          MODIFY_COUNT=$(jq '[.resource_changes[]? | select(.change.actions | index("update"))] | length' dev.tfplan.json)
          DESTROY_COUNT=$(jq '[.resource_changes[]? | select(.change.actions | index("delete"))] | length' dev.tfplan.json)

          {
            echo "### Terraform DEV Plan Summary"
            echo ""
            echo "| Change Type | Count |"
            echo "|---|---:|"
            echo "| Resources to add | ${ADD_COUNT} |"
            echo "| Resources to modify | ${MODIFY_COUNT} |"
            echo "| Resources to destroy | ${DESTROY_COUNT} |"
          } > plan-summary.md

          cat plan-summary.md >> "${GITHUB_STEP_SUMMARY}"

          {
            echo "add_count=${ADD_COUNT}"
            echo "modify_count=${MODIFY_COUNT}"
            echo "destroy_count=${DESTROY_COUNT}"
            echo "summary_text=Add: ${ADD_COUNT}, Modify: ${MODIFY_COUNT}, Destroy: ${DESTROY_COUNT}"
          } >> "${GITHUB_OUTPUT}"

      - name: Cost estimation placeholder
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          {
            echo ""
            echo "### Cost Estimation"
            echo ""
            echo "Infracost integration is reserved for a future pipeline iteration."
            echo ""
            echo "- Resources to create: ${{ steps.plan_summary.outputs.add_count }}"
            echo "- Resources to modify: ${{ steps.plan_summary.outputs.modify_count }}"
            echo "- Resources to destroy: ${{ steps.plan_summary.outputs.destroy_count }}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-plan
          path: |
            ${{ env.TF_WORKING_DIR }}/dev.tfplan
            ${{ env.TF_WORKING_DIR }}/dev.tfplan.json
            ${{ env.TF_WORKING_DIR }}/plan-summary.md
          retention-days: 1

      - name: Send Slack plan-ready notification
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
          PLAN_SUMMARY: ${{ steps.plan_summary.outputs.summary_text }}
        run: |
          jq -n \
            --arg environment "DEV" \
            --arg status "PLAN READY" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg commit "${GITHUB_SHA}" \
            --arg author "${GITHUB_ACTOR}" \
            --arg summary "${PLAN_SUMMARY}" \
            --arg workflow_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{
              text: "Terraform plan completed. Review the workflow and approve the DEV environment gate before apply.",
              blocks: [
                {type: "header", text: {type: "plain_text", text: "Terraform Infrastructure - PLAN READY"}},
                {type: "section", fields: [
                  {type: "mrkdwn", text: "*Environment:*\n\($environment)"},
                  {type: "mrkdwn", text: "*Status:*\n\($status)"},
                  {type: "mrkdwn", text: "*Repository:*\n\($repository)"},
                  {type: "mrkdwn", text: "*Commit:*\n\($commit)"},
                  {type: "mrkdwn", text: "*Author:*\n\($author)"},
                  {type: "mrkdwn", text: "*Terraform Plan Summary:*\n\($summary)"},
                  {type: "mrkdwn", text: "*Cost Estimate:*\nInfracost placeholder only"}
                ]},
                {type: "section", text: {type: "mrkdwn", text: "Terraform plan completed. Review the saved plan artifact, then approve the *dev* GitHub Environment deployment gate to run apply."}},
                {type: "actions", elements: [
                  {type: "button", text: {type: "plain_text", text: "View workflow"}, url: $workflow_url}
                ]}
              ]
            }' > slack-payload.json
          curl -fsS -X POST -H "Content-Type: application/json" --data @slack-payload.json "${SLACK_WEBHOOK_URL}"

  terraform_apply:
    name: "Stage 3 - Terraform Apply - Manual Approval Required"
    runs-on: ubuntu-latest
    needs:
      - terraform_plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    outputs:
      deployment_duration_seconds: ${{ steps.apply.outputs.deployment_duration_seconds }}
      state_count: ${{ steps.post_apply.outputs.state_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.azure_client_id }}
          tenant-id: ${{ secrets.azure_tenant_id }}
          subscription-id: ${{ secrets.azure_subscription_id }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${TF_STATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_STATE_CONTAINER}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="use_azuread_auth=true"

      - name: Download reviewed Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-dev-plan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform apply reviewed plan
        id: apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          START_TIME=$(date +%s)
          terraform apply -auto-approve -lock-timeout="${TF_LOCK_TIMEOUT}" dev.tfplan
          END_TIME=$(date +%s)
          echo "deployment_duration_seconds=$((END_TIME - START_TIME))" >> "${GITHUB_OUTPUT}"

      - name: Post-apply Terraform outputs and state
        id: post_apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform output -json > terraform-outputs.json
          terraform state list > terraform-state-list.txt
          STATE_COUNT=$(wc -l < terraform-state-list.txt | tr -d ' ')
          jq -r 'to_entries[] | "- \(.key): sensitive=\(.value.sensitive)"' terraform-outputs.json > outputs-summary.md

          {
            echo "### Terraform DEV Outputs Summary"
            echo ""
            cat outputs-summary.md
            echo ""
            echo "### Terraform State Resource Count"
            echo ""
            echo "${STATE_COUNT}"
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "state_count=${STATE_COUNT}" >> "${GITHUB_OUTPUT}"

      - name: Upload post-apply artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-post-apply
          path: |
            ${{ env.TF_WORKING_DIR }}/outputs-summary.md
            ${{ env.TF_WORKING_DIR }}/terraform-state-list.txt
          retention-days: 14

  notify_deployment:
    name: "Stage 4 - Slack Notification"
    runs-on: ubuntu-latest
    needs:
      - security_quality
      - terraform_plan
      - terraform_apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always()
    steps:
      - name: Send Slack deployment notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
          SECURITY_QUALITY_RESULT: ${{ needs.security_quality.result }}
          PLAN_RESULT: ${{ needs.terraform_plan.result }}
          APPLY_RESULT: ${{ needs.terraform_apply.result }}
          ADD_COUNT: ${{ needs.terraform_plan.outputs.add_count }}
          MODIFY_COUNT: ${{ needs.terraform_plan.outputs.modify_count }}
          DESTROY_COUNT: ${{ needs.terraform_plan.outputs.destroy_count }}
          DURATION: ${{ needs.terraform_apply.outputs.deployment_duration_seconds }}
          STATE_COUNT: ${{ needs.terraform_apply.outputs.state_count }}
        run: |
          STATUS="SUCCESS"
          MESSAGE="Terraform infrastructure deployment succeeded."
          FAILED_STAGE=""

          if [ "${SECURITY_QUALITY_RESULT}" = "failure" ]; then
            STATUS="FAILED"
            MESSAGE="Terraform infrastructure deployment failed."
            FAILED_STAGE="Security and Quality"
          elif [ "${PLAN_RESULT}" = "failure" ]; then
            STATUS="FAILED"
            MESSAGE="Terraform infrastructure deployment failed."
            FAILED_STAGE="Terraform Format, Plan and Slack"
          elif [ "${APPLY_RESULT}" = "failure" ]; then
            STATUS="FAILED"
            MESSAGE="Terraform infrastructure deployment failed."
            FAILED_STAGE="Terraform Apply"
          elif [ "${APPLY_RESULT}" = "skipped" ]; then
            STATUS="SKIPPED"
            MESSAGE="Terraform apply was skipped."
            FAILED_STAGE="Terraform Apply"
          fi

          jq -n \
            --arg environment "DEV" \
            --arg status "${STATUS}" \
            --arg message "${MESSAGE}" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg commit "${GITHUB_SHA}" \
            --arg workflow_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg failed_stage "${FAILED_STAGE}" \
            --arg created "${ADD_COUNT:-0}" \
            --arg updated "${MODIFY_COUNT:-0}" \
            --arg destroyed "${DESTROY_COUNT:-0}" \
            --arg duration "${DURATION:-0}s" \
            --arg state_count "${STATE_COUNT:-0}" \
            '{
              text: $message,
              blocks: [
                {type: "header", text: {type: "plain_text", text: ("Terraform Infrastructure - " + $status)}},
                {type: "section", fields: [
                  {type: "mrkdwn", text: "*Environment:*\n\($environment)"},
                  {type: "mrkdwn", text: "*Status:*\n\($status)"},
                  {type: "mrkdwn", text: "*Repository:*\n\($repository)"},
                  {type: "mrkdwn", text: "*Commit:*\n\($commit)"},
                  {type: "mrkdwn", text: "*Resources Created:*\n\($created)"},
                  {type: "mrkdwn", text: "*Resources Updated:*\n\($updated)"},
                  {type: "mrkdwn", text: "*Resources Destroyed:*\n\($destroyed)"},
                  {type: "mrkdwn", text: "*State Resources:*\n\($state_count)"},
                  {type: "mrkdwn", text: "*Deployment Duration:*\n\($duration)"},
                  {type: "mrkdwn", text: "*Failed/Skipped Stage:*\n\($failed_stage)"}
                ]},
                {type: "actions", elements: [
                  {type: "button", text: {type: "plain_text", text: "View workflow"}, url: $workflow_url}
                ]}
              ]
            }' > slack-payload.json
          curl -fsS -X POST -H "Content-Type: application/json" --data @slack-payload.json "${SLACK_WEBHOOK_URL}"

  drift_detection:
    name: "Scheduled Drift Detection - DEV"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.azure_client_id }}
          tenant-id: ${{ secrets.azure_tenant_id }}
          subscription-id: ${{ secrets.azure_subscription_id }}

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${TF_STATE_RESOURCE_GROUP}" \
            -backend-config="storage_account_name=${TF_STATE_STORAGE_ACCOUNT}" \
            -backend-config="container_name=${TF_STATE_CONTAINER}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="use_azuread_auth=true"

      - name: Run drift detection plan
        id: drift
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set +e
          terraform plan -detailed-exitcode -input=false -lock-timeout="${TF_LOCK_TIMEOUT}" -no-color -out=drift.tfplan > drift-plan.txt 2>&1
          EXIT_CODE=$?
          set -e

          ADD_COUNT=0
          MODIFY_COUNT=0
          DESTROY_COUNT=0
          if [ "${EXIT_CODE}" = "2" ]; then
            terraform show -json drift.tfplan > drift.tfplan.json
            ADD_COUNT=$(jq '[.resource_changes[]? | select(.change.actions | index("create"))] | length' drift.tfplan.json)
            MODIFY_COUNT=$(jq '[.resource_changes[]? | select(.change.actions | index("update"))] | length' drift.tfplan.json)
            DESTROY_COUNT=$(jq '[.resource_changes[]? | select(.change.actions | index("delete"))] | length' drift.tfplan.json)
          fi

          {
            echo "exit_code=${EXIT_CODE}"
            echo "add_count=${ADD_COUNT}"
            echo "modify_count=${MODIFY_COUNT}"
            echo "destroy_count=${DESTROY_COUNT}"
            echo "summary_text=Add: ${ADD_COUNT}, Modify: ${MODIFY_COUNT}, Destroy: ${DESTROY_COUNT}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "### Terraform DEV Drift Detection"
            echo ""
            echo "| Result | Value |"
            echo "|---|---:|"
            echo "| Exit code | ${EXIT_CODE} |"
            echo "| Resources to create | ${ADD_COUNT} |"
            echo "| Resources to modify | ${MODIFY_COUNT} |"
            echo "| Resources to destroy | ${DESTROY_COUNT} |"
          } >> "${GITHUB_STEP_SUMMARY}"

          if [ "${EXIT_CODE}" = "1" ]; then
            exit 1
          fi

      - name: Upload drift detection artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-drift-detection
          path: |
            ${{ env.TF_WORKING_DIR }}/drift-plan.txt
            ${{ env.TF_WORKING_DIR }}/drift.tfplan.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Slack alert - drift detected
        if: steps.drift.outputs.exit_code == '2'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
          DRIFT_SUMMARY: ${{ steps.drift.outputs.summary_text }}
        run: |
          jq -n \
            --arg environment "DEV" \
            --arg status "DRIFT DETECTED" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg commit "${GITHUB_SHA}" \
            --arg workflow_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg summary "${DRIFT_SUMMARY}" \
            '{
              text: "Terraform drift detected. No automatic correction was applied.",
              blocks: [
                {type: "header", text: {type: "plain_text", text: "Terraform Infrastructure - DRIFT DETECTED"}},
                {type: "section", fields: [
                  {type: "mrkdwn", text: "*Environment:*\n\($environment)"},
                  {type: "mrkdwn", text: "*Status:*\n\($status)"},
                  {type: "mrkdwn", text: "*Repository:*\n\($repository)"},
                  {type: "mrkdwn", text: "*Commit:*\n\($commit)"},
                  {type: "mrkdwn", text: "*Plan Summary:*\n\($summary)"},
                  {type: "mrkdwn", text: "*Workflow URL:*\n\($workflow_url)"}
                ]}
              ]
            }' > slack-payload.json
          curl -fsS -X POST -H "Content-Type: application/json" --data @slack-payload.json "${SLACK_WEBHOOK_URL}"

      - name: Slack alert - drift detection failed
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
        run: |
          jq -n \
            --arg environment "DEV" \
            --arg status "FAILED" \
            --arg failed_stage "Scheduled Drift Detection" \
            --arg workflow_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --arg commit "${GITHUB_SHA}" \
            '{
              text: "Terraform drift detection failed.",
              blocks: [
                {type: "header", text: {type: "plain_text", text: "Terraform Drift Detection - FAILED"}},
                {type: "section", fields: [
                  {type: "mrkdwn", text: "*Environment:*\n\($environment)"},
                  {type: "mrkdwn", text: "*Status:*\n\($status)"},
                  {type: "mrkdwn", text: "*Failed Stage:*\n\($failed_stage)"},
                  {type: "mrkdwn", text: "*Commit SHA:*\n\($commit)"},
                  {type: "mrkdwn", text: "*Workflow URL:*\n\($workflow_url)"}
                ]}
              ]
            }' > slack-payload.json
          curl -fsS -X POST -H "Content-Type: application/json" --data @slack-payload.json "${SLACK_WEBHOOK_URL}"
